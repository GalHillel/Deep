<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Platform | Local IDE</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- App Layout -->
    <div id="app-container">
        <!-- 0. Activity Bar (Far Left) -->
        <aside id="activity-bar">
            <div class="activity-item active" data-tool="explorer" title="Explorer (Ctrl+E)">📁</div>
            <div class="activity-item" data-tool="search" title="Search">🔍</div>
            <div class="activity-item" data-tool="git" title="Source Control">⑂</div>
            <div class="activity-item" data-tool="prs" title="Pull Requests">⛙</div>
            <div class="activity-item" data-tool="issues" title="Issues">⊙</div>
            <div class="activity-item" data-tool="work" title="Dashboard">⚡</div>
            <div class="activity-item mt-auto" data-tool="settings" title="Settings">⚙️</div>
        </aside>

        <!-- 1. Sidebar (Explorer/Git/PRs/Issues) -->
        <aside id="sidebar-pane" class="resizable">
            <header id="sidebar-header">
                <span id="sidebar-title">EXPLORER</span>
                <div id="sidebar-actions">
                    <span title="New File" onclick="UI.promptNewFile()">＋</span>
                    <span title="Refresh" onclick="UI.loadTree()">⟳</span>
                </div>
            </header>
            <div id="sidebar-content">
                <!-- Dynamic content based on activity-bar selection -->
                <div id="explorer-view" class="tool-view">
                    <div id="file-tree"></div>
                </div>
                <div id="git-view" class="tool-view hidden">
                    <div class="tool-section">
                        <h3>Branches</h3>
                        <div id="branch-info">
                            <span id="current-branch-name" class="status-badge status-ready">main</span>
                            <span onclick="UI.promptNewBranch()" style="cursor:pointer">＋</span>
                        </div>
                        <div id="branches-list"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Resizer Left -->
        <div class="resizer" id="resizer-left"></div>

        <!-- 2. Main Editor Area -->
        <main id="editor-pane">
            <header id="editor-tabs-bar">
                <div id="tabs-container">
                    <!-- Dynamic Tabs -->
                </div>
                <div id="editor-actions">
                    <button id="diff-toggle-btn" class="icon-btn hidden" onclick="UI.toggleDiff()" title="Toggle Change View">⑄</button>
                    <button class="icon-btn" onclick="window.saveFile()" title="Save (Ctrl+S)">💾</button>
                    <button class="icon-btn" onclick="UI.loadTree()" title="Refresh Tree">⟳</button>
                </div>
            </header>

            <div id="editor-workspace">
                <div id="monaco-container"></div>
                <div id="diff-container" class="hidden"></div>
            </div>

            <footer id="editor-status-bar">
                <div class="status-left">
                    <span id="status-branch">⑂ main</span>
                    <span id="status-sync">↑0 ↓0</span>
                </div>
                <div class="status-right">
                    <span id="status-encoding">UTF-8</span>
                    <span id="status-lang">Plain Text</span>
                </div>
            </footer>
        </main>

        <!-- Resizer Right -->
        <div class="resizer" id="resizer-right"></div>

        <!-- 3. Context Panel (Right) -->
        <aside id="context-pane" class="resizable">
            <header class="panel-header">SOURCE CONTROL</header>
            <div class="panel-content">
                <div class="staging-area">
                    <h4>STAGED CHANGES</h4>
                    <div id="staged-list" class="mini-list"></div>
                    
                    <h4>CHANGES</h4>
                    <div id="changed-list" class="mini-list"></div>
                </div>

                <div class="commit-section">
                    <textarea id="commit-msg-input" placeholder="Message (Ctrl+Enter to commit)"></textarea>
                    <button id="commit-primary-btn" class="btn-primary" onclick="window.commitChanges()">Commit</button>
                </div>

                <div class="ai-insight">
                    <h4>AI INSIGHT</h4>
                    <p id="ai-summary">Select a file to see diff analysis...</p>
                    <button class="btn-ghost" onclick="UI.getAISummary()">Analyze Changes</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Hidden / Global Components -->
    <div id="toast-container"></div>
    <div id="detail-overlay" class="hidden">
        <div id="detail-panel">
            <div id="detail-header"></div>
            <div id="detail-body"></div>
        </div>
    </div>

    <!-- App Logic -->
    <script>
        // Monaco Loader Setup
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    </script>
    <script src="state.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
