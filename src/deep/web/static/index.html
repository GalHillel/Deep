<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Platform | Local IDE</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <h1>Deep <span>Platform</span></h1>
        
        <div class="nav-section">
            <h3>Explorer</h3>
            <div class="nav-item active" data-tab="ide">
                <span class="nav-icon">💻</span> IDE <kbd>Ctrl+E</kbd>
            </div>
            <div class="nav-item" data-tab="graph">
                <span class="nav-icon">📊</span> Git Graph
            </div>
        </div>

        <div class="nav-section">
            <h3>Collaboration</h3>
            <div class="nav-item" data-tab="prs">
                <span class="nav-icon">⛙</span> Pull Requests
            </div>
            <div class="nav-item" data-tab="issues">
                <span class="nav-icon">⊙</span> Issues
            </div>
        </div>

        <div class="nav-section">
            <h3>Branch Management</h3>
            <div id="branch-info" style="padding: 0 20px 10px; display: flex; align-items: center; justify-content: space-between;">
                <span id="current-branch-name" class="status-badge status-ready" style="font-family: var(--font-mono);">main</span>
                <span title="New Branch" style="cursor: pointer; opacity: 0.6;" onclick="UI.promptNewBranch()">＋</span>
            </div>
            <div id="branches-list" style="max-height: 150px; overflow-y: auto; padding: 0 10px;"></div>
        </div>

        <div class="nav-section">
            <h3>Workspace</h3>
            <div class="nav-item" data-tab="work">
                <span class="nav-icon">⚡</span> Dashboard
            </div>
        </div>

        <div class="sidebar-bottom" style="padding: 20px; margin-top: auto; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); text-align: center;">
            Deep Platform v1.0.0
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main">
        <header id="topbar">
            <div class="topbar-tabs">
                <button class="tab-btn active" data-tab="ide">Editor</button>
                <button class="tab-btn" data-tab="graph">Graph</button>
                <button class="tab-btn" data-tab="prs">PRs</button>
                <button class="tab-btn" data-tab="issues">Issues</button>
            </div>
            
            <div class="topbar-actions">
                <input type="text" id="search-input" placeholder="Search files, commits, issues...">
            </div>
        </header>

        <section id="content-area">
            
            <!-- Graph Tab -->
            <div id="graph-tab" class="tab-content hidden">
                <div id="dag"></div>
            </div>

            <!-- IDE Tab -->
            <div id="ide-tab" class="tab-content">
                <div id="ide-container">
                    <aside id="ide-sidebar">
                        <div id="file-tree-header">
                            PROJECT
                            <div id="file-tree-actions">
                                <span title="New File">＋</span>
                                <span title="Refresh" onclick="UI.loadTree()">⟳</span>
                            </div>
                        </div>
                        <div id="file-tree">
                            <div class="skeleton"></div>
                            <div class="skeleton"></div>
                            <div class="skeleton" style="width: 70%"></div>
                        </div>
                    </aside>
                    <main id="ide-main">
                        <div id="monaco-container"></div>
                        <footer id="commit-panel">
                            <input type="text" id="commit-msg" placeholder="What did you change?">
                            <button id="commit-btn" onclick="commitChanges()">Commit Changes</button>
                        </footer>
                    </main>
                </div>
            </div>

            <!-- PRs Tab -->
            <div id="prs-tab" class="tab-content padding hidden">
                <h2>Pull Requests</h2>
                <div id="prs-list" class="card-list"></div>
            </div>

            <!-- Issues Tab -->
            <div id="issues-tab" class="tab-content padding hidden">
                <h2>Issues</h2>
                <div id="issues-list" class="card-list"></div>
            </div>

            <!-- Work Tab -->
            <div id="work-tab" class="tab-content padding hidden">
                <div id="work-dashboard">
                    <div class="work-hero">
                        <h2>Workspace Insight</h2>
                        <p>Active on branch: <span id="work-branch-name" class="branch-name">...</span></p>
                    </div>
                    
                    <div class="work-stats">
                        <div class="work-stat-card">
                            <div id="stat-prs" class="stat-value">0</div>
                            <div class="stat-label">Open PRs</div>
                        </div>
                        <div class="work-stat-card">
                            <div id="stat-issues" class="stat-value">0</div>
                            <div class="stat-label">Open Issues</div>
                        </div>
                    </div>

                    <div class="work-section">
                        <h3>Unstaged Changes</h3>
                        <div id="work-changed-files" class="card-list"></div>
                    </div>
                </div>
            </div>

        </section>

        <!-- Slide-out Detail Panel -->
        <aside id="detail-panel">
            <div id="detail-header"></div>
            <div id="detail-body"></div>
        </aside>

        <!-- Toasts -->
        <div id="toast-container"></div>
    </main>

    <!-- App Logic -->
    <script>
        // Monaco Loader Setup
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    </script>
    <script src="state.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
