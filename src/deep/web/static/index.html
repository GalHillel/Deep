<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>DeepVCS Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #e5e7eb; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        .activity-icon { display: flex; justify-content: center; align-items: center; height: 48px; color: #6b7280; cursor: pointer; transition: all 0.2s; border-left: 2px solid transparent; }
        .activity-icon:hover { color: #e5e7eb; }
        .activity-icon.active { color: #38bdf8; border-left-color: #38bdf8; background: rgba(56, 189, 248, 0.1); }
        
        .panel { display: none; height: 100%; flex-direction: column; }
        .panel.active { display: flex; }
        #network-canvas { outline: none; width: 100%; height: 100%; background: #0b0f19; }
        /* Glassmorphism & Diff Visualization Styles */
        .glass-tile {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
        }
        .glass-tile:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 40px 0 rgba(0, 255, 255, 0.15);
            border-color: rgba(6, 182, 212, 0.4);
        }
        .diff-minimap {
            width: 8px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .minimap-line { height: 2px; width: 100%; opacity: 0.8; }
        .minimap-add { background-color: #22c55e; }
        .minimap-del { background-color: #ef4444; }
        .minimap-mod { background-color: #eab308; }
        .minimap-null { background-color: transparent; }

        .diff-block {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
            border-radius: 6px;
            overflow: hidden;
        }
        .diff-line { padding: 0 8px; white-space: pre-wrap; word-break: break-all; display: flex; }
        .diff-line.add { background: rgba(34, 197, 94, 0.15); color: #86efac; border-left: 2px solid #22c55e; }
        .diff-line.del { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-left: 2px solid #ef4444; }
        .diff-line.mod { background: rgba(234, 179, 8, 0.15); color: #fde047; border-left: 2px solid #eab308; }
        .diff-line.header { background: rgba(6, 182, 212, 0.1); color: #67e8f9; border-bottom: 1px solid rgba(6, 182, 212, 0.2); }

        @keyframes flowDiff {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .wave-active {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: flowDiff 3s infinite linear;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-12 bg-[#030712] border-b border-gray-800 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cube text-cyan-500 text-xl"></i>
            <span class="font-bold tracking-wider text-gray-200">Deep<span class="text-gray-500">Studio</span></span>
        </div>
        <div id="toast-container" class="fixed top-2 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none">
            <div id="toast-msg" class="bg-cyan-900 text-cyan-100 px-4 py-2 rounded shadow-lg border border-cyan-700 text-sm font-bold"></div>
        </div>
        <div class="flex items-center gap-4 text-xs font-mono">
            <button onclick="App.triggerCheckout()" class="bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded text-cyan-400 border border-gray-700"><i class="fa-solid fa-code-branch mr-1"></i> <span id="header-branch">loading...</span></button>
            <span id="header-status" class="text-gray-400"><i class="fa-solid fa-rotate animate-spin"></i> Syncing</span>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <nav class="w-14 bg-[#030712] border-r border-gray-800 flex flex-col pt-2 shrink-0">
            <div id="nav-code" class="activity-icon active" onclick="App.switchTab('code')" title="Code Explorer"><i class="fa-regular fa-folder-open text-xl"></i></div>
            <div id="nav-graph" class="activity-icon" onclick="App.switchTab('graph')" title="Commit Graph"><i class="fa-solid fa-code-branch text-xl"></i></div>
            <div id="nav-diff" class="activity-icon" onclick="App.switchTab('diff')" title="View Diffs"><i class="fa-solid fa-file-contract text-xl"></i></div>
            <div id="nav-prs" class="activity-icon" onclick="App.switchTab('prs')" title="Pull Requests"><i class="fa-solid fa-code-pull-request text-xl"></i></div>
            <div id="nav-issues" class="activity-icon" onclick="App.switchTab('issues')" title="Issues"><i class="fa-regular fa-circle-dot text-xl"></i></div>
        </nav>

        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col z-10 shrink-0">
            <div class="h-10 flex items-center justify-between px-3 border-b border-slate-800 shadow-sm shrink-0 select-none">
                <span class="text-xs font-bold tracking-wider text-slate-200 uppercase truncate" id="explorer-project-name">PROJECT</span>
                <div class="flex items-center gap-2 text-slate-500">
                    <button onclick="App.createItem('file')" title="New File..." class="hover:text-cyan-400 p-1 rounded transition-colors">
                        <i class="fa-solid fa-file-medical text-sm"></i>
                    </button>
                    <button onclick="App.createItem('folder')" title="New Folder..." class="hover:text-cyan-400 p-1 rounded transition-colors">
                        <i class="fa-solid fa-folder-plus text-sm"></i>
                    </button>
                </div>
            </div>
            
            <div id="sidebar-content" class="flex-1 overflow-y-auto p-2 scrollbar-hide">
                <!-- File Tree Injected Here -->
            </div>
        </aside>

        <main class="flex-1 bg-[#0b0f19] relative">
            
            <div id="panel-code" class="panel active relative">
                <div id="editor-header" class="h-10 bg-[#1f2937] flex items-center px-4 font-mono text-xs text-cyan-400 border-b border-gray-800">No file selected</div>
                <div id="monaco-container" class="flex-1 w-full h-full"></div>
                <div class="h-14 bg-slate-900 border-t border-slate-800 p-2 flex items-center gap-2 shrink-0">
                    <button onclick="App.saveCurrentFile()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-1.5 rounded text-sm font-semibold shadow transition-colors flex items-center gap-2">
                        <i class="fa-regular fa-floppy-disk"></i> Save
                    </button>
                    <input type="text" id="commit-msg-input" placeholder="Commit message..." class="flex-1 bg-slate-950 border border-slate-700 rounded px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-cyan-500">
                    <button onclick="App.commitCurrentFile()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-2">
                        <i class="fa-solid fa-check"></i> Commit
                    </button>
                </div>
            </div>

            <div id="panel-graph" class="panel relative">
                <div id="network-canvas"></div>
                <div id="commit-card" class="absolute top-6 right-6 w-96 bg-[#111827] border border-gray-700 rounded-xl shadow-2xl hidden flex-col z-10">
                    <div class="flex justify-between items-center bg-[#1f2937] p-3 border-b border-gray-700 rounded-t-xl">
                        <span id="cc-sha" class="font-mono text-cyan-400 font-bold"></span>
                        <i class="fa-solid fa-xmark cursor-pointer text-gray-400 hover:text-white" onclick="document.getElementById('commit-card').classList.add('hidden')"></i>
                    </div>
                    <div class="p-4 space-y-3">
                        <div class="text-gray-300"><i class="fa-solid fa-user-astronaut text-gray-500 mr-2"></i><span id="cc-author"></span></div>
                        <div class="bg-[#030712] p-3 rounded border border-gray-800 text-gray-400 font-mono text-sm whitespace-pre-wrap" id="cc-msg"></div>
                    </div>
                </div>
            </div>

            <div id="panel-diff" class="panel p-6 overflow-y-auto bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white tracking-wide"><i class="fa-solid fa-layer-group text-cyan-400 mr-2"></i> Working Tree</h2>
                    <div class="flex gap-4">
                        <button onclick="App.stageAll()" class="bg-cyan-600/20 hover:bg-cyan-600/40 border border-cyan-500/50 text-cyan-300 px-4 py-1.5 rounded font-bold shadow-lg transition-all backdrop-blur"><i class="fa-solid fa-check-double mr-2"></i>Stage All</button>
                    </div>
                </div>

                <div id="staging-controls" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-slate-900/50 border border-slate-700/50 rounded-xl p-4 shadow-inner">
                        <h3 class="text-slate-400 font-bold mb-3 flex items-center justify-between uppercase text-xs tracking-widest">
                            <span><i class="fa-regular fa-file-code mr-2"></i> Unstaged Changes</span>
                            <span id="badge-unstaged" class="bg-slate-800 text-slate-300 px-2 py-0.5 rounded-full">0</span>
                        </h3>
                        <div id="list-unstaged" class="space-y-1 max-h-48 overflow-y-auto pr-2"></div>
                    </div>
                    
                    <div class="bg-cyan-950/30 border border-cyan-900/50 rounded-xl p-4 shadow-inner">
                        <h3 class="text-cyan-400 font-bold mb-3 flex items-center justify-between uppercase text-xs tracking-widest">
                            <span><i class="fa-solid fa-inbox mr-2"></i> Staged (Ready for Commit)</span>
                            <span id="badge-staged" class="bg-cyan-900 text-cyan-200 px-2 py-0.5 rounded-full">0</span>
                        </h3>
                        <div id="list-staged" class="space-y-1 max-h-48 overflow-y-auto pr-2"></div>
                    </div>
                </div>

                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-eye text-purple-400 mr-2"></i> Visual Changes</h3>
                <div id="diff-grid" class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6 auto-rows-max">
                    <!-- Diff tiles will be injected here -->
                    </div>
            </div>

            <div id="panel-prs" class="panel p-6 overflow-y-auto">
                <div id="prs-content"></div>
            </div>

            <div id="panel-issues" class="panel p-6 overflow-y-auto">
                <div id="issues-content"></div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
