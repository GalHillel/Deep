<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Platform | Local IDE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
</head>
<body>
    <!-- 1. Sidebar -->
    <aside id="sidebar">
        <h1><span>Deep</span> Platform</h1>
        
        <div class="nav-section">
            <h3>Explorer</h3>
            <div class="nav-item active" data-tab="ide">
                <span class="nav-icon">💻</span> IDE
                <kbd>Ctrl+E</kbd>
            </div>
            <div class="nav-item" data-tab="graph">
                <span class="nav-icon">📊</span> Git Graph
            </div>
        </div>

        <div class="nav-section">
            <h3>Collaboration</h3>
            <div class="nav-item" data-tab="prs">
                <span class="nav-icon"> branch </span> Pull Requests
                <span class="badge badge-count hidden" id="pr-badge">0</span>
            </div>
            <div class="nav-item" data-tab="issues">
                <span class="nav-icon">⊙</span> Issues
                <span class="badge badge-count hidden" id="issue-badge">0</span>
            </div>
        </div>

        <div class="nav-section">
            <h3>Workspace</h3>
            <div class="nav-item" data-tab="work">
                <span class="nav-icon">⚡</span> Dashboard
            </div>
        </div>

        <div class="sidebar-bottom">
            <div class="nav-section">
                <div class="health-badge">● System Online</div>
                <div id="current-branch" style="font-size: 12px; color: var(--text-muted);">main</div>
            </div>
        </div>
    </aside>

    <!-- 2. Main Area -->
    <main id="main">
        <header id="topbar">
            <div class="topbar-tabs">
                <button class="tab-btn active" data-tab="ide">Editor</button>
                <button class="tab-btn" data-tab="graph">Graph</button>
                <button class="tab-btn" data-tab="prs">PRs</button>
                <button class="tab-btn" data-tab="issues">Issues</button>
            </div>
            
            <div class="topbar-actions">
                <div class="branch-selector">
                    <span class="nav-icon">branch</span>
                    <select id="branch-select" onchange="UI.checkoutBranch(this.value)">
                        <option value="main">main</option>
                    </select>
                </div>
                <input type="text" id="search-input" placeholder="Search files, commits, issues...">
                <div id="sync-info" class="pr-stats"></div>
            </div>
        </header>

        <section id="content-area">
            <!-- IDE TAB -->
            <div id="ide-tab" class="tab-content hidden">
                <div id="ide-container">
                    <div id="ide-sidebar">
                        <div id="file-tree-header">
                            <span>EXPLORER</span>
                            <div id="file-tree-actions">
                                <span class="tree-action-btn" title="Refresh" onclick="UI.loadTree()">↻</span>
                                <span class="tree-action-btn" title="New File" onclick="UI.createNewFile()">+</span>
                            </div>
                        </div>
                        <div id="file-tree"></div>
                    </div>
                    
                    <div id="ide-main">
                        <div id="monaco-container"></div>
                        <div id="diff-container" class="hidden"></div>
                        <div id="commit-panel">
                            <button id="diff-toggle-btn" class="action-btn hidden" onclick="UI.toggleDiff()">View Diff</button>
                            <input type="text" id="commit-msg" placeholder="Message (Ctrl+Enter to commit)">
                            <button id="commit-btn" onclick="window.commitChanges()">Commit</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GRAPH TAB -->
            <div id="graph-tab" class="tab-content hidden">
                <div id="graph-layout">
                    <div id="graph-container">
                        <div id="dag"></div>
                    </div>
                    <div id="graph-detail" class="hidden">
                        <div class="detail-header">
                            <h3>Commit Details</h3>
                            <span class="close-btn" onclick="UI.hideGraphDetail()">×</span>
                        </div>
                        <div id="graph-detail-content"></div>
                    </div>
                </div>
            </div>

            <!-- PRS TAB -->
            <div id="prs-tab" class="tab-content padding hidden">
                <div class="list-header">
                    <h2>Pull Requests</h2>
                </div>
                <div id="prs-list" class="card-list"></div>
            </div>

            <!-- ISSUES TAB -->
            <div id="issues-tab" class="tab-content padding hidden">
                <div class="list-header">
                    <h2>Issues</h2>
                </div>
                <div id="issues-list" class="card-list"></div>
            </div>

            <!-- WORK DASHBOARD TAB -->
            <div id="work-tab" class="tab-content padding hidden">
                <div id="work-dashboard">
                    <div class="work-hero">
                        <h2>Current Branch: <span id="work-branch-name" class="branch-name">...</span></h2>
                    </div>
                    <div class="work-stats">
                        <div class="work-stat-card"><div id="stat-prs" class="stat-value">0</div><div class="stat-label">Open PRs</div></div>
                        <div class="work-stat-card"><div id="stat-issues" class="stat-value">0</div><div class="stat-label">Active Issues</div></div>
                    </div>
                    <div class="work-section">
                        <h3>Changes</h3>
                        <div id="work-changed-files" class="card-list"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Detail Panel (for PRs/Issues) -->
    <div id="detail-panel">
        <span id="detail-close" onclick="UI.hideDetail()">✕</span>
        <div id="detail-header"></div>
        <div id="detail-body"></div>
    </div>

    <!-- Toasts -->
    <div id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        window.MonacoEnvironment = { getWorkerUrl: () => proxy };
        let proxy = URL.createObjectURL(new Blob([`
            self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' };
            importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
        `], { type: 'text/javascript' }));
    </script>
    <script src="api.js"></script>
    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
