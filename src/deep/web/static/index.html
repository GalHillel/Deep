<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚓ Deep V3 — Local Dev Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' } });
        window.MonacoEnvironment = {
            getWorkerUrl: function(workerId, label) {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                    self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' };
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/base/worker/workerMain.js');
                `)}`;
            }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
</head>
<body>
    <!-- 0. Activity Bar -->
    <nav class="activity-bar">
        <div class="activity-item active" data-tab="work" title="Workspace">🏠</div>
        <div class="activity-item" data-tab="ide" title="Editor">📝</div>
        <div class="activity-item" data-tab="scm" title="Source Control">🌳</div>
        <div class="activity-item" data-tab="graph" title="Git Graph">🎋</div>
        <div class="activity-item" data-tab="prs" title="Pull Requests">🔀</div>
        <div class="activity-item" data-tab="issues" title="Issues">🎫</div>
        <div style="margin-top: auto;" class="activity-item" title="Settings">⚙️</div>
    </nav>

    <!-- 1. Contextual Sidebar -->
    <aside id="sidebar">
        <div id="brand">
            <span class="brand-icon">⚓</span>
            <span class="brand-text">Deep</span>
        </div>
        <div id="sidebar-content">
            <!-- Loaded via JS based on Active Tab -->
        </div>
    </aside>

    <!-- 2. Main Content Area -->
    <main id="main">
        <header id="topbar">
            <div class="topbar-left">
                <div class="topbar-tabs">
                    <button class="tab-btn active" data-tab="work">Dashboard</button>
                    <button class="tab-btn" data-tab="ide">Editor</button>
                    <button class="tab-btn" data-tab="graph">Visual Graph</button>
                    <button class="tab-btn" data-tab="prs">PRs</button>
                    <button class="tab-btn" data-tab="issues">Issues</button>
                </div>
            </div>
            
            <div class="topbar-right">
                <div class="branch-selector">
                    <span style="opacity:0.6">on</span>
                    <select id="branch-select" onchange="UI.checkoutBranch(this.value)"></select>
                </div>
            </div>
        </header>

        <section id="content-area">
            <!-- Tab: Work Dashboard -->
            <div id="work-tab" class="tab-content">
                <div style="padding: 40px;">
                    <div class="work-hero">
                        <h2 id="work-branch-name">main</h2>
                        <div id="sync-info" class="text-muted">Loading repo state...</div>
                    </div>
                    <div class="work-stats" style="display:flex; gap:20px; margin-top:32px;"></div>
                    <div style="margin-top:48px;">
                        <h3 style="font-size:12px; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px;">Local Changes</h3>
                        <div id="work-changed-files" class="grid-list"></div>
                    </div>
                </div>
            </div>

            <!-- Tab: IDE -->
            <div id="ide-tab" class="tab-content hidden">
                <div id="ide-container">
                    <div id="ide-sidebar">
                        <div id="file-tree-header" style="padding:12px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:11px; font-weight:700; color:var(--text-muted);">EXPLORER</span>
                            <div style="display:flex; gap:8px;">
                                <span class="action-btn" onclick="UI.createNewFile()" style="padding:2px 6px;">+</span>
                                <span class="action-btn" onclick="UI.loadTree()" style="padding:2px 6px;">↻</span>
                            </div>
                        </div>
                        <div id="file-tree-ide" class="nav-section"></div>
                    </div>
                    <div id="ide-main">
                        <div id="editor-tabs"></div>
                        <div id="monaco-container"></div>
                        <div id="diff-container" class="hidden"></div>
                        <footer id="commit-panel">
                            <input type="text" id="commit-msg" placeholder="What did you change? (Ctrl+Enter to commit)">
                            <button class="action-btn" onclick="UI.commitChanges()">Commit</button>
                        </footer>
                    </div>
                </div>
            </div>

            <!-- Tab: Graph -->
            <div id="graph-tab" class="tab-content hidden">
                <div id="dag" style="width:100%; height:100%;"></div>
            </div>

            <!-- Tab: PRs -->
            <section id="prs-tab" class="tab-content hidden">
                <div id="pr-list-view" class="pr-feed"></div>
                <div id="pr-detail-view" class="pr-detail-container hidden"></div>
            </section>

            <!-- Tab: Issues -->
            <section id="issues-tab" class="tab-content hidden">
                <div id="issue-list-view" class="pr-feed"></div>
                <div id="issue-detail-view" class="pr-detail-container hidden"></div>
            </section>
        </section>

        <!-- Status Bar -->
        <footer class="statusBar">
            <div class="status-left">
                <span class="status-item">⚓ Deep V3</span>
                <span class="status-item" id="repo-status">READY</span>
            </div>
            <div class="status-right">
                <span class="status-item" id="current-branch-status">main</span>
                <span class="status-item">UTF-8</span>
                <span class="status-item" onclick="UI.toggleRightSidebar()">Intel</span>
            </div>
        </footer>
    </main>

    <!-- 3. Global Intel Sidebar -->
    <aside id="right-sidebar" class="hidden">
        <div id="right-sidebar-header">
            <h3>Commit Intelligence</h3>
            <button onclick="UI.closeRightSidebar()">×</button>
        </div>
        <div id="right-sidebar-content"></div>
    </aside>

    <div id="toast-container"></div>
    <div id="ctx-menu" class="hidden"></div>

    <script src="state.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
